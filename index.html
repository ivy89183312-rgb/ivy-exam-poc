<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模考練習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #0f1e3c;
  --navy2:  #1a3160;
  --gold:   #c8a84b;
  --gold2:  #e8c96b;
  --cream:  #faf8f3;
  --paper:  #f4f1ea;
  --ink:    #1a1a2e;
  --gray:   #6b7280;
  --lgray:  #e5e2da;
  --green:  #2d6a4f;
  --red:    #9b1c1c;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(15,30,60,0.10);
  --shadow-lg: 0 12px 48px rgba(15,30,60,0.18);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.7;
}

/* ===== LAYOUT ===== */
.view { display: none; min-height: 100vh; }
.view.active { display: flex; flex-direction: column; }

/* ===== TOPBAR ===== */
.topbar {
  background: var(--navy);
  color: white;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.topbar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  letter-spacing: 0.03em;
  color: var(--gold);
}
.topbar-logo span { color: white; }
.topbar-user {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.7);
  display: flex; align-items: center; gap: 10px;
}
.btn-logout {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
.btn-logout:hover { background: rgba(255,255,255,0.22); }

/* ===== LOGIN VIEW ===== */
#view-login {
  background: var(--navy);
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.login-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, #1a3160 0%, #0f1e3c 60%);
}
.login-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(200,168,75,0.04) 60px, rgba(200,168,75,0.04) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(200,168,75,0.04) 60px, rgba(200,168,75,0.04) 61px);
}
.login-card {
  position: relative; z-index: 2;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,168,75,0.25);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 56px 52px;
  max-width: 440px;
  width: 90%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2.4rem;
  color: var(--gold);
  line-height: 1.2;
  margin-bottom: 8px;
}
.login-subtitle {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.55);
  margin-bottom: 40px;
  letter-spacing: 0.06em;
}
.divider {
  border: none;
  border-top: 1px solid rgba(200,168,75,0.2);
  margin: 32px 0;
}
.login-note {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  margin-top: 24px;
}

/* Google Sign-In button container */
#g_id_onload, .g_id_signin { display: flex; justify-content: center; }

/* ===== ACTIVATE VIEW ===== */
#view-activate .container {
  max-width: 520px;
  margin: 80px auto;
  padding: 0 24px;
  animation: fadeUp 0.4s ease both;
}
.activate-card {
  background: white;
  border-radius: 16px;
  padding: 48px;
  box-shadow: var(--shadow-lg);
  border-top: 4px solid var(--gold);
}
.activate-card h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.8rem;
  color: var(--navy);
  margin-bottom: 8px;
}
.activate-card p { color: var(--gray); margin-bottom: 32px; font-size: 0.92rem; }

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.06em;
  color: var(--navy);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.form-group input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--lgray);
  border-radius: 8px;
  font-size: 1rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink);
  background: var(--cream);
  transition: border-color 0.2s;
  letter-spacing: 0.1em;
}
.form-group input:focus {
  outline: none;
  border-color: var(--gold);
  background: white;
}

.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { background: var(--navy2); transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.msg-error {
  background: #fef2f2; border: 1px solid #fca5a5; color: var(--red);
  padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-top: 16px;
}
.msg-success {
  background: #ecfdf5; border: 1px solid #6ee7b7; color: var(--green);
  padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-top: 16px;
}

/* ===== TESTS VIEW ===== */
#view-tests { background: var(--paper); }
#view-tests .container { max-width: 860px; margin: 0 auto; padding: 48px 24px; flex: 1; }
.tests-header { margin-bottom: 40px; }
.tests-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  color: var(--navy);
}
.tests-header p { color: var(--gray); margin-top: 6px; }

.test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.test-card {
  background: white;
  border-radius: 14px;
  padding: 28px;
  cursor: pointer;
  border: 2px solid transparent;
  box-shadow: var(--shadow);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.test-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform 0.2s;
  transform-origin: bottom;
}
.test-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.test-card:hover::before { transform: scaleY(1); }
.test-badge {
  display: inline-block;
  background: var(--navy);
  color: var(--gold);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
  text-transform: uppercase;
}
.test-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 6px;
}
.test-card .test-meta { font-size: 0.82rem; color: var(--gray); }
.test-arrow {
  position: absolute; right: 20px; bottom: 20px;
  font-size: 1.4rem; color: var(--lgray);
  transition: all 0.2s;
}
.test-card:hover .test-arrow { color: var(--gold); transform: translateX(4px); }

.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 80px; color: var(--gray);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--lgray);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== QUIZ VIEW ===== */
#view-quiz { background: var(--paper); }
.quiz-topbar {
  background: white;
  border-bottom: 1px solid var(--lgray);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.quiz-title { font-weight: 700; font-size: 1rem; color: var(--navy); }
.quiz-meta { font-size: 0.82rem; color: var(--gray); margin-top: 2px; }
.quiz-progress {
  display: flex; align-items: center; gap: 12px;
}
.progress-bar-wrap {
  width: 160px; height: 6px;
  background: var(--lgray); border-radius: 99px;
}
.progress-bar-fill {
  height: 100%; background: var(--gold); border-radius: 99px;
  transition: width 0.3s ease;
}
.progress-txt { font-size: 0.78rem; color: var(--gray); white-space: nowrap; }

.quiz-body { max-width: 820px; margin: 0 auto; padding: 40px 24px 120px; }

/* Section block */
.section-block {
  background: white;
  border-radius: 14px;
  margin-bottom: 32px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.section-header {
  background: var(--navy);
  color: white;
  padding: 16px 28px;
  display: flex; align-items: center; gap: 14px;
}
.section-type-badge {
  background: var(--gold);
  color: var(--navy);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.section-label { font-size: 0.9rem; color: rgba(255,255,255,0.8); }
.section-range { margin-left: auto; font-size: 0.82rem; color: var(--gold); font-family: 'JetBrains Mono', monospace; }

.section-passage {
  padding: 24px 28px;
  font-size: 0.96rem;
  line-height: 2;
  color: #333;
  border-bottom: 1px solid var(--lgray);
  white-space: pre-wrap;
}
.section-image {
  padding: 16px 28px 0;
}
.section-image img {
  max-width: 100%; border-radius: 8px;
  border: 1px solid var(--lgray);
}

/* Word bank (type 3) */
.wordbank {
  margin: 16px 28px;
  padding: 16px;
  background: var(--cream);
  border-radius: 8px;
  border: 1px solid var(--lgray);
}
.wordbank-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.wordbank-items {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.wordbank-item {
  background: white;
  border: 1px solid var(--lgray);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 0.88rem;
}
.wordbank-item b { color: var(--navy); font-family: 'JetBrains Mono', monospace; }

/* Questions */
.questions-list { padding: 8px 0; }

.question-item {
  padding: 20px 28px;
  border-bottom: 1px solid var(--lgray);
  transition: background 0.15s;
}
.question-item:last-child { border-bottom: none; }
.question-item.answered { background: #fafdf9; }

.question-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  background: var(--navy);
  color: white;
  border-radius: 50%;
  font-size: 0.78rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin-right: 10px;
  flex-shrink: 0;
}
.question-num.answered { background: var(--green); }

.question-text {
  font-size: 0.97rem;
  line-height: 1.75;
  color: var(--ink);
  margin-bottom: 16px;
  display: flex; align-items: flex-start;
}

/* Radio options */
.options-list { display: flex; flex-direction: column; gap: 8px; margin-left: 38px; }
.option-label {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 16px;
  border: 2px solid var(--lgray);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.92rem;
}
.option-label:hover { border-color: var(--gold); background: #fffbf0; }
.option-label input[type="radio"] { display: none; }
.option-label.selected { border-color: var(--navy); background: #f0f4ff; }
.option-key {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--navy);
  width: 20px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* Select dropdown (type 3/4) */
.blank-select {
  padding: 6px 12px;
  border: 2px solid var(--gold);
  border-radius: 6px;
  background: white;
  font-size: 0.88rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--navy);
  cursor: pointer;
  margin: 0 2px;
  min-width: 100px;
}
.blank-select:focus { outline: none; border-color: var(--navy); }

/* Text input (type 6) */
.blank-input {
  padding: 5px 12px;
  border: 2px solid var(--gold);
  border-radius: 6px;
  background: white;
  font-size: 0.92rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--navy);
  width: 160px;
  margin: 0 3px;
}
.blank-input:focus { outline: none; border-color: var(--navy); }
.blank-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  background: var(--gold);
  color: var(--navy);
  border-radius: 50%;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin: 0 2px;
  vertical-align: middle;
}

/* Paragraph options (type 4) */
.para-options { display: flex; flex-direction: column; gap: 8px; margin-left: 38px; }
.para-option {
  padding: 12px 16px;
  border: 2px solid var(--lgray);
  border-radius: 8px;
  font-size: 0.9rem;
  line-height: 1.6;
  cursor: pointer;
  transition: all 0.15s;
}
.para-option:hover { border-color: var(--gold); background: #fffbf0; }
.para-option.selected { border-color: var(--navy); background: #f0f4ff; }
.para-option-key {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; color: var(--navy); margin-right: 8px;
}

/* Section question (type 6) */
.section-question {
  padding: 20px 28px;
  font-size: 0.95rem;
  line-height: 2.2;
  background: var(--cream);
  border-bottom: 1px solid var(--lgray);
}
.section-question-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 10px;
}

/* Submit button area */
.quiz-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 2px solid var(--lgray);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 50;
}
.quiz-answer-count { font-size: 0.88rem; color: var(--gray); }
.quiz-answer-count b { color: var(--navy); }

.btn-submit {
  padding: 14px 36px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.btn-submit:hover { background: var(--gold); color: var(--navy); }
.btn-submit.ready { background: var(--green); animation: pulse 2s ease infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(45,106,79,0.4); }
  50%       { box-shadow: 0 0 0 10px rgba(45,106,79,0); }
}

/* ===== RESULTS VIEW ===== */
#view-results { background: var(--paper); }
.results-body { max-width: 720px; margin: 0 auto; padding: 60px 24px; }

.score-card {
  background: var(--navy);
  color: white;
  border-radius: 20px;
  padding: 48px;
  text-align: center;
  margin-bottom: 32px;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.5s ease both;
}
.score-label {
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.score-number {
  font-family: 'DM Serif Display', serif;
  font-size: 5rem;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
.score-total { font-size: 1.2rem; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
.score-bar-wrap {
  background: rgba(255,255,255,0.1);
  height: 12px; border-radius: 99px;
  overflow: hidden; margin: 0 auto; max-width: 320px;
}
.score-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 99px;
  transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.score-percent {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  color: var(--gold2);
  margin-top: 10px;
}

.review-toggle {
  background: white;
  border: none;
  width: 100%;
  padding: 16px 24px;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.2s;
}
.review-toggle:hover { box-shadow: var(--shadow-lg); }

.review-list { display: none; }
.review-list.open { display: block; }

.review-item {
  background: white;
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border-left: 4px solid var(--lgray);
  font-size: 0.9rem;
}
.review-item.correct { border-color: var(--green); }
.review-item.wrong   { border-color: var(--red); }
.review-item.skipped { border-color: #f59e0b; }

.review-q { color: var(--gray); margin-bottom: 6px; }
.review-user { margin-bottom: 4px; }
.review-answer { font-weight: 700; }
.correct .review-answer { color: var(--green); }
.wrong .review-answer { color: var(--red); }
.review-correct-ans { color: var(--green); font-size: 0.85rem; }

.btn-retry {
  display: block;
  width: 100%;
  padding: 16px;
  background: white;
  border: 2px solid var(--navy);
  color: var(--navy);
  font-size: 1rem;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s;
  text-align: center;
}
.btn-retry:hover { background: var(--navy); color: white; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .topbar { padding: 12px 16px; }
  .quiz-body { padding: 24px 12px 120px; }
  .section-passage, .section-header, .question-item { padding-left: 16px; padding-right: 16px; }
  .options-list, .para-options { margin-left: 0; }
  .login-card { padding: 40px 28px; }
  .login-title { font-size: 1.8rem; }
  .quiz-topbar { padding: 12px 16px; }
  .progress-bar-wrap { width: 100px; }
  .quiz-footer { padding: 12px 16px; }
  .results-body { padding: 32px 16px; }
  .score-card { padding: 36px 24px; }
  .score-number { font-size: 4rem; }
}
</style>
</head>
<body>

<!-- ==================== LOGIN VIEW ==================== -->
<div id="view-login" class="view">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-title">模考練習</div>
    <div class="login-subtitle">PRACTICE EXAM SYSTEM</div>
    <hr class="divider">
    <p style="font-size:0.88rem;color:rgba(255,255,255,0.5);margin-bottom:20px;">請使用 Google 帳號登入</p>

    <!-- Google One Tap -->
    <div id="g_id_onload"
      data-client_id="1015787800358-6okt3a86ojgouvs0bk37n72dh11roo6n.apps.googleusercontent.com"
      data-callback="onGoogleSignIn"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-theme="outline"
      data-size="large"
      data-text="signin_with"
      data-shape="rectangular"
      data-locale="zh-TW">
    </div>

    <p class="login-note">僅限受邀用戶使用。登入後需輸入序號才能開始練習。</p>
  </div>
</div>

<!-- ==================== ACTIVATE VIEW ==================== -->
<div id="view-activate" class="view">
  <div class="topbar">
    <div class="topbar-logo">模考<span>練習</span></div>
    <div class="topbar-user">
      <span id="activate-email-display"></span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="container">
    <div class="activate-card">
      <h2>🔑 輸入序號</h2>
      <p>請輸入管理員提供的專屬序號，兌換後即可使用全部試卷。</p>

      <div class="form-group">
        <label>序號</label>

<script src="https://accounts.google.com/gsi/client" async defer>// 頁面載入時自動顯示登入畫面
showView('login');
</script>
<script>

// ============================================================
//  CONFIG — 請填入你的設定
// ============================================================
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbwq-DlQxG7pQ-GwAowXBcWve5opsXJA_nJrsRZU-r0RtuPCw5Yhb01FJnfpYWIAewTiHA/exec';
// Google Client ID 已在上面 g_id_onload 的 data-client_id 設定

// ============================================================
//  State
// ============================================================
let userEmail   = '';
let currentTest = null;   // { test_id, test_name, test_type }
let quizData    = null;   // { questions, sections }
let answers     = {};     // { question_id: value }

// ============================================================
//  API Helper
// ============================================================
async function api(action, params = {}) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ============================================================
//  Google Sign-In
// ============================================================
function onGoogleSignIn(response) {
  const payload = parseJWT(response.credential);
  if (!payload || !payload.email) { alert('登入失敗，請重試'); return; }
  userEmail = payload.email;
  afterLogin();
}

function parseJWT(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  } catch { return null; }
}

async function afterLogin() {
  // 1. 註冊（若已存在會 skip）
  await api('registerUser', { email: userEmail }).catch(() => {});
  // 2. 檢查序號是否已開通
  const { hasAccess } = await api('checkAccess', { email: userEmail });
  if (hasAccess) {
    showTests();
  } else {
    showView('activate');
    document.getElementById('activate-email-display').textContent = userEmail;
  }
}

function logout() {
  if (!confirm('確定登出？')) return;
  google.accounts.id.disableAutoSelect();
  userEmail = ''; answers = {}; quizData = null; currentTest = null;
  showView('login');
}

// ============================================================
//  Views
// ============================================================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================
//  Activate Code
// ============================================================
async function submitCode() {
  const code = document.getElementById('code-input').value.trim();
  const btn  = document.getElementById('code-btn');
  const msg  = document.getElementById('code-msg');
  if (!code) { showMsg(msg, '請輸入序號', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '驗證中…';
  msg.innerHTML = '';

  try {
    const data = await api('activateCode', { email: userEmail, code });
    if (data.status === 'activated') {
      showMsg(msg, '✅ 序號兌換成功！即將進入試卷列表…', 'success');
      setTimeout(showTests, 1500);
    } else {
      showMsg(msg, data.error || '兌換失敗', 'error');
    }
  } catch (e) {
    showMsg(msg, '連線失敗，請稍後再試', 'error');
  }
  btn.disabled = false;
  btn.textContent = '兌換序號';
}

function showMsg(el, text, type) {
  el.innerHTML = `<div class="msg-${type}">${text}</div>`;
}

// ============================================================
//  Tests List
// ============================================================
async function showTests() {
  showView('tests');
  document.getElementById('tests-email-display').textContent = userEmail;
  const grid = document.getElementById('test-grid');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>載入中…</span></div>';

  try {
    const tests = await api('getTests');
    if (!tests || !tests.length) {
      grid.innerHTML = '<p style="color:var(--gray);padding:40px;">目前尚無試卷</p>';
      return;
    }
    grid.innerHTML = tests.map(t => {
      const typeLabel = String(t.test_type) === 'w' ? '筆試' : '聽力';
      return `
      <div class="test-card" onclick="startTest('${norm(t.test_id)}', '${esc(t.test_name)}', '${typeLabel}')">
        <div class="test-badge">${typeLabel}</div>
        <h3>${esc(t.test_name) || '試卷 ' + norm(t.test_id)}</h3>
        <div class="test-meta">${norm(t.test_id)}</div>
        <div class="test-arrow">→</div>
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--red);padding:40px;">載入失敗，請重新整理</p>';
  }
}

// ============================================================
//  Quiz
// ============================================================
async function startTest(testId, testName, typeLabel) {
  answers = {};
  currentTest = { test_id: testId, test_name: testName, type_label: typeLabel };
  showView('quiz');
  document.getElementById('quiz-title').textContent = testName || '試卷 ' + testId;
  document.getElementById('quiz-meta').textContent = typeLabel;
  document.getElementById('quiz-body').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><span>載入題目中…</span></div>';

  try {
    quizData = await api('getTest', { testId });
    renderQuiz();
  } catch (e) {
    document.getElementById('quiz-body').innerHTML =
      '<p style="color:var(--red);padding:40px;">題目載入失敗，請返回重試</p>';
  }
}

function renderQuiz() {
  const { questions, sections } = quizData;
  const sectionMap = {};
  sections.forEach(s => { sectionMap[norm(s.section_id)] = s; });

  const processedSections = new Set();
  const blocks = [];
  let qNum = 1;

  questions.forEach(q => {
    const type = String(q.type);
    const secId = norm(q.section_id);

    if (type === '1') {
      blocks.push(renderType1(q, qNum++));
    } else if (!processedSections.has(secId)) {
      processedSections.add(secId);
      const secQs = questions.filter(sq => norm(sq.section_id) === secId);
      const sec   = sectionMap[secId] || {};
      const start = qNum;
      const end   = qNum + secQs.length - 1;

      switch (type) {
        case '2': blocks.push(renderClozeSection(sec, secQs, start)); break;
        case '3': blocks.push(renderWordFillSection(sec, secQs, start)); break;
        case '4': blocks.push(renderParaSection(sec, secQs, start)); break;
        case '5': blocks.push(renderReadingSection(sec, secQs, start)); break;
        case '6': blocks.push(renderMixedSection(sec, secQs, start)); break;
        default:  blocks.push(renderReadingSection(sec, secQs, start));
      }
      qNum = end + 1;
    }
  });

  const totalQ = questions.length;
  document.getElementById('quiz-body').innerHTML = blocks.join('');
  document.getElementById('total-count').textContent = totalQ;
  document.getElementById('progress-txt').textContent = '0 / ' + totalQ;
  updateProgress();
}

/* ----- Type 1: 詞彙題 ----- */
function renderType1(q, num) {
  const qid = norm(q.question_id);
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">詞彙題</span>
      <span class="section-label"></span>
      <span class="section-range">${num}</span>
    </div>
    <div class="questions-list">${renderMCQ(q, num, qid)}</div>
  </div>`;
}

/* ----- Type 2: 綜合測驗（克漏字）----- */
function renderClozeSection(sec, qs, startNum) {
  const content = replaceBlankNumbers(sec.section_content || '', startNum);
  const qItems = qs.map((q, i) => renderMCQ(q, startNum + i, norm(q.question_id))).join('');
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">綜合測驗</span>
      <span class="section-label">閱讀文章，選出最適合的答案</span>
      <span class="section-range">${startNum}–${startNum + qs.length - 1}</span>
    </div>
    <div class="section-passage">${content}</div>
    <div class="questions-list">${qItems}</div>
  </div>`;
}

/* ----- Type 3: 文意選填 ----- */
function renderWordFillSection(sec, qs, startNum) {
  const opts = getOptions(sec);
  const wordBankHTML = `
    <div class="wordbank">
      <div class="wordbank-title">Word Bank</div>
      <div class="wordbank-items">
        ${opts.map(o => `<div class="wordbank-item"><b>${o.letter}</b>　${o.text}</div>`).join('')}
      </div>
    </div>`;

  // Replace ## with numbered dropdown selects
  const content = replaceBlanksWithSelect(sec.section_content || '', qs, startNum, opts, 'fill');
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">文意選填</span>
      <span class="section-label">從選項中選出最適合的字詞填入空格</span>
      <span class="section-range">${startNum}–${startNum + qs.length - 1}</span>
    </div>
    ${wordBankHTML}
    <div class="section-passage">${content}</div>
  </div>`;
}

/* ----- Type 4: 篇章結構 ----- */
function renderParaSection(sec, qs, startNum) {
  const opts = getOptions(sec);
  const sentenceOpts = `
  <div class="wordbank">
    <div class="wordbank-title">選項句子</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
      ${opts.map(o => `<div class="wordbank-item" style="width:100%"><b>${o.letter}</b>　${o.text}</div>`).join('')}
    </div>
  </div>`;

  const content = replaceBlanksWithSelect(sec.section_content || '', qs, startNum, opts, 'para');
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">篇章結構</span>
      <span class="section-label">選出最適合填入空格的句子</span>
      <span class="section-range">${startNum}–${startNum + qs.length - 1}</span>
    </div>
    ${sentenceOpts}
    <div class="section-passage">${content}</div>
  </div>`;
}

/* ----- Type 5: 閱讀測驗 ----- */
function renderReadingSection(sec, qs, startNum) {
  const qItems = qs.map((q, i) => renderMCQ(q, startNum + i, norm(q.question_id))).join('');
  const imgHTML = sec.pic
    ? `<div class="section-image"><img src="${driveUrl(sec.pic)}" alt="題目圖片" onerror="this.style.display='none'"></div>`
    : '';
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">閱讀測驗</span>
      <span class="section-label">閱讀文章後回答問題</span>
      <span class="section-range">${startNum}–${startNum + qs.length - 1}</span>
    </div>
    ${imgHTML}
    <div class="section-passage">${esc(sec.section_content || '').replace(/\n/g,'<br>')}</div>
    <div class="questions-list">${qItems}</div>
  </div>`;
}

/* ----- Type 6: 混合題 ----- */
function renderMixedSection(sec, qs, startNum) {
  const imgHTML = sec.pic
    ? `<div class="section-image"><img src="${driveUrl(sec.pic)}" alt="題目圖片" onerror="this.style.display='none'"></div>`
    : '';
  // section_question has ## for text inputs
  const sqContent = replaceBlanksWithInput(sec.section_question || '', qs, startNum);
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="section-type-badge">混合題</span>
      <span class="section-label">閱讀文章後填入正確答案</span>
      <span class="section-range">${startNum}–${startNum + qs.length - 1}</span>
    </div>
    ${imgHTML}
    <div class="section-passage">${esc(sec.section_content || '').replace(/\n/g,'<br>')}</div>
    <div class="section-question">
      <div class="section-question-label">填空題</div>
      <span>${sqContent}</span>
    </div>
  </div>`;
}

// ============================================================
//  Render Helpers
// ============================================================

/** MCQ question (type 1, 2, 5) */
function renderMCQ(q, num, qid) {
  const opts = ['A','B','C','D'];
  const optKeys = ['option1_A','option2_B','option3_C','option4_D'];
  const qText = q.question ? `<span>${esc(q.question)}</span>` : `<span>第 ${num} 題</span>`;
  const optHTML = opts.map((letter, i) => {
    const text = q[optKeys[i]] || '';
    if (!text) return '';
    return `
    <label class="option-label" onclick="selectMCQ('${qid}','${letter}',this)">
      <input type="radio" name="q_${qid}" value="${letter}">
      <span class="option-key">${letter}</span>
      <span>${esc(String(text))}</span>
    </label>`;
  }).join('');
  return `
  <div class="question-item" id="qi_${qid}">
    <div class="question-text">
      <span class="question-num" id="qnum_${qid}">${num}</span>
      ${qText}
    </div>
    <div class="options-list">${optHTML}</div>
  </div>`;
}

/** Replace ## with colored inline numbers (for type 2 display) */
function replaceBlankNumbers(text, startNum) {
  let n = startNum;
  return esc(text).replace(/##/g, () =>
    `<span class="blank-num">${n++}</span>`);
}

/** Replace ## with dropdown selects (type 3, 4) */
function replaceBlanksWithSelect(text, qs, startNum, opts, mode) {
  let idx = 0;
  return esc(text).replace(/\n/g, '<br>').replace(/##/g, () => {
    if (idx >= qs.length) return `<span class="blank-num">?</span>`;
    const q = qs[idx];
    const qid = norm(q.question_id);
    const num = startNum + idx;
    idx++;
    const optHTML = opts.map(o =>
      `<option value="${o.letter}">${o.letter} — ${o.text.length > 40 ? o.text.slice(0,40)+'…' : o.text}</option>`
    ).join('');
    return `
      <span class="blank-num">${num}</span>
      <select class="blank-select" id="qs_${qid}" onchange="selectDrop('${qid}',this.value)">
        <option value="">—</option>${optHTML}
      </select>`;
  });
}

/** Replace ## with text inputs (type 6) */
function replaceBlanksWithInput(text, qs, startNum) {
  let idx = 0;
  return esc(text).replace(/\n/g, '<br>').replace(/##/g, () => {
    if (idx >= qs.length) return `____`;
    const q = qs[idx];
    const qid = norm(q.question_id);
    const num = startNum + idx;
    idx++;
    return `
      <span class="blank-num">${num}</span>
      <input class="blank-input" id="qi_input_${qid}" type="text" placeholder="填入答案"
        oninput="selectInput('${qid}',this.value)">`;
  });
}

/** Get options array from section row */
function getOptions(sec) {
  const letters = ['A','B','C','D','E','F','G','H','I','J'];
  const keys = ['option1_A','option2_B','option3_C','option4_D','option5_E',
                 'option6_F','option7_G','option8_H','option9_I','option10_J'];
  return keys
    .map((k, i) => ({ letter: letters[i], text: String(sec[k] || '') }))
    .filter(o => o.text);
}

/** Convert Google Drive share URL to direct display URL */
function driveUrl(url) {
  if (!url) return '';
  const m = String(url).match(/\/file\/d\/([^\/\?]+)/);
  return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : url;
}

// ============================================================
//  Answer Recording
// ============================================================

function selectMCQ(qid, letter, labelEl) {
  answers[qid] = letter;
  // Update UI
  labelEl.closest('.options-list').querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
  labelEl.classList.add('selected');
  labelEl.closest('.question-item').classList.add('answered');
  document.getElementById('qnum_' + qid)?.classList.add('answered');
  updateProgress();
}

function selectDrop(qid, value) {
  if (value) {
    answers[qid] = value;
  } else {
    delete answers[qid];
  }
  updateProgress();
}

function selectInput(qid, value) {
  const v = value.trim();
  if (v) {
    answers[qid] = v;
  } else {
    delete answers[qid];
  }
  updateProgress();
}

function updateProgress() {
  if (!quizData) return;
  const total    = quizData.questions.length;
  const answered = Object.keys(answers).length;
  const pct      = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('total-count').textContent    = total;
  document.getElementById('progress-bar').style.width   = pct + '%';
  document.getElementById('progress-txt').textContent   = `${answered} / ${total}`;

  const btn = document.getElementById('submit-btn');
  if (answered === total) btn.classList.add('ready');
  else btn.classList.remove('ready');
}

// ============================================================
//  Submit & Score
// ============================================================

function confirmSubmit() {
  const total    = quizData?.questions?.length || 0;
  const answered = Object.keys(answers).length;
  const unanswered = total - answered;
  if (unanswered > 0) {
    if (!confirm(`尚有 ${unanswered} 題未作答，確定要交卷嗎？`)) return;
  }
  calcAndShowResults();
}

function calcAndShowResults() {
  const { questions } = quizData;
  let score = 0, total = 0;
  const reviewItems = [];
  let qNum = 1;

  questions.forEach(q => {
    const qid     = norm(q.question_id);
    const correct = String(q.answer || '').trim();
    const user    = String(answers[qid] || '').trim();
    const pts     = Number(q.score) || 0;
    total += pts;

    const isCorrect = user.toLowerCase() === correct.toLowerCase();
    if (user && isCorrect) score += pts;

    reviewItems.push({ qid, qNum: qNum++, correct, user, pts, isCorrect });
  });

  showView('results');

  // Animate score
  const pct = total ? Math.round(score / total * 100) : 0;
  document.getElementById('result-total').textContent   = `/ ${total} 分`;
  document.getElementById('result-percent').textContent = pct + '%';

  let displayed = 0;
  const target = score;
  const step   = Math.max(1, Math.ceil(target / 40));
  const timer  = setInterval(() => {
    displayed = Math.min(displayed + step, target);
    document.getElementById('result-score').textContent = displayed;
    if (displayed >= target) clearInterval(timer);
  }, 30);

  setTimeout(() => {
    document.getElementById('result-bar').style.width = pct + '%';
  }, 100);

  // Build review list
  const reviewHTML = reviewItems.map(r => {
    const cls = !r.user ? 'skipped' : r.isCorrect ? 'correct' : 'wrong';
    const statusIcon = !r.user ? '⏭ 未作答' : r.isCorrect ? '✅ 正確' : '❌ 錯誤';
    return `
    <div class="review-item ${cls}">
      <div class="review-q">第 ${r.qNum} 題（${r.pts} 分）</div>
      <div class="review-user">你的答案：<span class="review-answer">${r.user || '—'}</span>　${statusIcon}</div>
      ${!r.isCorrect ? `<div class="review-correct-ans">正確答案：${r.correct}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('review-list').innerHTML = reviewHTML;
}

function toggleReview(btn) {
  const list = document.getElementById('review-list');
  list.classList.toggle('open');
  btn.querySelector('span:last-child').textContent = list.classList.contains('open') ? '▲' : '▼';
}

// ============================================================
//  Utilities
// ============================================================

function norm(val) {
  return String(val || '').trim().replace(/\.0+$/, '');
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function backToTests() {
  if (!confirm('確定返回試卷列表？目前作答進度將不會儲存。')) return;
  answers = {}; quizData = null;
  showTests();
}

// 頁面載入時自動顯示登入畫面
showView('login');
</script>
