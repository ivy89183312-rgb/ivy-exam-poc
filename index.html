<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivy 模考衝刺 PLUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F6F8;
  --card:#FFFFFF;
  --primary:#6C63FF;
  --primary-light:#EAE9FF;
  --primary-dark:#5A52D5;
  --accent:#FFD93D;
  --accent-dark:#F0C800;
  --emphasis:#FF6B6B;
  --success:#6BCB77;
  --success-light:#E8F8EA;
  --text:#1A1A1A;
  --text-2:#6B7280;
  --border:#E5E7EB;
  --shadow:0 2px 12px rgba(108,99,255,0.08);
  --shadow-md:0 4px 20px rgba(108,99,255,0.12);
  --shadow-lg:0 8px 40px rgba(108,99,255,0.16);
  --r:20px;
  --r-sm:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}

/* ===== LOADING OVERLAY ===== */
#loading-overlay{
  position:fixed;inset:0;background:rgba(245,246,248,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:20px;backdrop-filter:blur(4px);
}
#loading-overlay.hidden{display:none}
.ov-spinner{
  width:52px;height:52px;
  border:5px solid var(--primary-light);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
.ov-text{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;color:var(--primary)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== VIEWS ===== */
.view{display:none;min-height:100vh}
.view.active{display:block}

/* ===== TOPBAR ===== */
.topbar{
  background:var(--card);
  border-bottom:2px solid var(--border);
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);
}
.topbar-logo{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:var(--primary);
  display:flex;align-items:center;gap:8px;
}
.topbar-logo .logo-plus{
  background:var(--accent);color:var(--text);
  font-size:.7rem;padding:2px 8px;border-radius:99px;
  font-weight:900;letter-spacing:.04em;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-email{font-size:.82rem;color:var(--text-2)}
.btn-ghost{
  background:var(--bg);border:2px solid var(--border);color:var(--text-2);
  padding:6px 16px;border-radius:99px;cursor:pointer;
  font-size:.82rem;font-weight:700;font-family:'Nunito',sans-serif;
  transition:all .2s;
}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

/* ===== LOGIN VIEW ===== */
#view-login{
  min-height:100vh;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#EAE9FF 0%,#F5F6F8 50%,#FFF9E6 100%);
  position:relative;overflow:hidden;
}
#view-login.active{display:flex}
#view-login::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 20% 20%,rgba(108,99,255,.08) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(255,217,61,.12) 0%,transparent 50%);
}
.login-card{
  position:relative;z-index:2;
  background:var(--card);
  border-radius:28px;
  padding:56px 52px;
  max-width:440px;width:90%;
  text-align:center;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .5s ease both;
}
.login-emoji{font-size:3.5rem;margin-bottom:16px;display:block}
.login-title{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:2rem;color:var(--text);margin-bottom:4px;
}
.login-title span{color:var(--primary)}
.login-subtitle{font-size:.88rem;color:var(--text-2);margin-bottom:36px}
.login-divider{border:none;border-top:2px solid var(--border);margin:28px 0}
.login-note{font-size:.78rem;color:var(--text-2);margin-top:20px}
.g_id_signin{display:flex;justify-content:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== ACTIVATE VIEW ===== */
#view-activate{background:var(--bg)}
.activate-wrap{max-width:500px;margin:64px auto;padding:0 24px;animation:fadeUp .4s ease both}
.card{background:var(--card);border-radius:var(--r);padding:40px;box-shadow:var(--shadow-md)}
.card-icon{font-size:2.5rem;margin-bottom:16px}
.card h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;color:var(--text);margin-bottom:8px}
.card p{font-size:.9rem;color:var(--text-2);margin-bottom:28px}
.form-label{display:block;font-weight:700;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.form-input{
  width:100%;padding:14px 18px;
  border:2px solid var(--border);border-radius:var(--r-sm);
  font-size:1rem;font-family:monospace;color:var(--text);
  background:var(--bg);letter-spacing:.12em;
  transition:border-color .2s,background .2s;
}
.form-input:focus{outline:none;border-color:var(--primary);background:#fff}
.btn-primary{
  width:100%;padding:15px;margin-top:12px;
  background:var(--primary);color:#fff;border:none;border-radius:var(--r-sm);
  font-size:1rem;font-weight:900;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg-error{background:#FFF1F1;border:2px solid #FFBDBD;color:#C0392B;padding:12px 16px;border-radius:var(--r-sm);font-size:.88rem;margin-top:14px}
.msg-success{background:var(--success-light);border:2px solid #A8E6AE;color:#276B31;padding:12px 16px;border-radius:var(--r-sm);font-size:.88rem;margin-top:14px}

/* ===== TESTS VIEW ===== */
#view-tests{background:var(--bg)}
.tests-inner{max-width:900px;margin:0 auto;padding:36px 24px 60px}
.tabs{display:flex;gap:8px;margin-bottom:28px}
.tab-btn{
  padding:10px 24px;border-radius:99px;border:2px solid var(--border);
  background:var(--card);font-weight:700;font-size:.9rem;cursor:pointer;
  font-family:'Nunito',sans-serif;color:var(--text-2);transition:all .2s;
}
.tab-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.section-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;color:var(--text);margin-bottom:6px}
.section-sub{font-size:.88rem;color:var(--text-2);margin-bottom:24px}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.test-card{
  background:var(--card);border-radius:var(--r);padding:26px;
  cursor:pointer;border:2px solid transparent;
  box-shadow:var(--shadow);transition:all .25s;position:relative;overflow:hidden;
}
.test-card:hover{border-color:var(--primary);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.test-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-light);color:var(--primary);
  font-size:.72rem;font-weight:800;font-family:'Nunito',sans-serif;
  letter-spacing:.06em;padding:4px 12px;border-radius:99px;
  margin-bottom:14px;text-transform:uppercase;
}
.test-card h3{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem;color:var(--text);margin-bottom:4px}
.test-card .test-id{font-size:.8rem;color:var(--text-2);margin-bottom:12px}
.attempted-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--success-light);color:var(--success);
  font-size:.75rem;font-weight:700;font-family:'Nunito',sans-serif;
  padding:4px 10px;border-radius:99px;
}
.test-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:1.3rem;color:var(--border);transition:all .2s}
.test-card:hover .test-arrow{color:var(--primary);transform:translateY(-50%) translateX(4px)}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

/* History */
.history-list{display:flex;flex-direction:column;gap:14px}
.history-card{background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow)}
.history-card-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.history-test-name{font-weight:800;font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text)}
.history-meta{font-size:.82rem;color:var(--text-2);margin-top:3px}
.history-score-chip{
  display:flex;flex-direction:column;align-items:center;
  background:var(--primary-light);color:var(--primary);
  border-radius:var(--r-sm);padding:8px 18px;min-width:80px;text-align:center;
}
.history-score-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;line-height:1}
.history-score-total{font-size:.72rem;font-weight:700}
.history-review{display:none;margin-top:18px;border-top:2px solid var(--border);padding-top:18px}
.history-review.open{display:block}
.review-grid{display:flex;flex-direction:column;gap:8px}
.review-row{
  padding:12px 16px;border-radius:var(--r-sm);font-size:.88rem;
  border-left:4px solid var(--border);background:var(--bg);
}
.review-row.correct{border-color:var(--success);background:var(--success-light)}
.review-row.wrong{border-color:var(--emphasis);background:#FFF1F1}
.review-row.skipped{border-color:var(--accent);background:#FFFDF0}
.rr-q{color:var(--text-2);font-size:.8rem;margin-bottom:4px}
.rr-ans{font-weight:700}
.rr-correct{color:var(--success)}
.rr-wrong{color:var(--emphasis)}
.rr-correct-hint{font-size:.82rem;color:var(--success);margin-top:3px}

/* ===== QUIZ VIEW ===== */
#view-quiz{background:var(--bg)}
.quiz-topbar{
  background:var(--card);border-bottom:2px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:var(--shadow);
}
.quiz-info .quiz-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--text)}
.quiz-info .quiz-sub{font-size:.78rem;color:var(--text-2)}
.quiz-prog{display:flex;align-items:center;gap:12px}
.prog-bar-wrap{width:140px;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#9C8CFF);border-radius:99px;transition:width .3s ease}
.prog-txt{font-size:.8rem;font-weight:700;font-family:'Nunito',sans-serif;color:var(--primary);white-space:nowrap}
.quiz-body{max-width:820px;margin:0 auto;padding:32px 24px 120px}

/* Section block */
.section-block{background:var(--card);border-radius:var(--r);margin-bottom:24px;box-shadow:var(--shadow);overflow:hidden}
.section-header{
  background:linear-gradient(135deg,var(--primary) 0%,#9C8CFF 100%);
  padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.type-badge{
  background:rgba(255,255,255,.2);color:#fff;
  font-size:.72rem;font-weight:800;font-family:'Nunito',sans-serif;
  letter-spacing:.06em;padding:4px 12px;border-radius:99px;text-transform:uppercase;
}
.section-label{font-size:.85rem;color:rgba(255,255,255,.85);flex:1}
.section-range{
  background:var(--accent);color:var(--text);
  font-size:.78rem;font-weight:900;font-family:'Nunito',sans-serif;
  padding:4px 12px;border-radius:99px;margin-left:auto;
}
.section-passage{padding:22px 26px;font-size:.96rem;line-height:2.1;color:var(--text);border-bottom:2px solid var(--border);white-space:pre-wrap}
.section-image{padding:18px 26px 0}
.section-image img{max-width:100%;border-radius:var(--r-sm);border:2px solid var(--border)}

/* Wordbank */
.wordbank{margin:16px 24px;padding:16px;background:var(--bg);border-radius:var(--r-sm);border:2px solid var(--border)}
.wb-title{font-size:.72rem;font-weight:800;color:var(--primary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-family:'Nunito',sans-serif}
.wb-items{display:flex;flex-wrap:wrap;gap:8px}
.wb-item{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:5px 14px;font-size:.88rem}
.wb-item b{color:var(--primary);font-family:'Nunito',sans-serif;margin-right:4px}

/* Inline blank elements */
.blank-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;background:var(--accent);color:var(--text);
  border-radius:50%;font-size:.72rem;font-weight:900;font-family:'Nunito',sans-serif;
  margin:0 3px;vertical-align:middle;
}
.blank-select{
  padding:5px 10px;border:2px solid var(--primary-light);border-radius:8px;
  background:#fff;font-size:.86rem;color:var(--text);cursor:pointer;
  margin:0 3px;min-width:120px;font-family:'Noto Sans TC',sans-serif;
}
.blank-select:focus{outline:none;border-color:var(--primary)}
.blank-input{
  padding:5px 12px;border:2px solid var(--primary-light);border-radius:8px;
  background:#fff;font-size:.9rem;color:var(--text);width:160px;margin:0 3px;
  font-family:'Noto Sans TC',sans-serif;
}
.blank-input:focus{outline:none;border-color:var(--primary)}

/* Questions */
.questions-list{padding:4px 0}
.question-item{padding:20px 26px;border-bottom:2px solid var(--bg);transition:background .15s}
.question-item:last-child{border-bottom:none}
.question-item.answered{background:#FAFBFF}
.q-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.q-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;min-width:30px;
  background:var(--primary-light);color:var(--primary);
  border-radius:50%;font-size:.78rem;font-weight:900;font-family:'Nunito',sans-serif;
  flex-shrink:0;margin-top:2px;transition:all .2s;
}
.q-num.answered{background:var(--success);color:#fff}
.q-text{font-size:.96rem;line-height:1.75;color:var(--text)}
.options-list{display:flex;flex-direction:column;gap:8px;margin-left:40px}
.opt-label{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border:2px solid var(--border);border-radius:var(--r-sm);
  cursor:pointer;transition:all .15s;font-size:.92rem;
}
.opt-label:hover{border-color:var(--primary);background:var(--primary-light)}
.opt-label.selected{border-color:var(--primary);background:var(--primary-light)}
.opt-label input[type="radio"]{display:none}
.opt-key{font-family:'Nunito',sans-serif;font-weight:800;color:var(--primary);width:20px;flex-shrink:0;margin-top:1px}

/* ===== DRAG & DROP (Type 4 篇章結構) ===== */
.sentence-bank{margin:16px 24px;padding:16px;background:var(--bg);border-radius:var(--r-sm);border:2px dashed var(--border)}
.sb-title{font-size:.72rem;font-weight:800;color:var(--primary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;font-family:'Nunito',sans-serif}
.sb-items{display:flex;flex-direction:column;gap:8px}
.draggable-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;background:var(--card);border:2px solid var(--border);
  border-radius:var(--r-sm);cursor:grab;user-select:none;
  transition:all .2s;font-size:.88rem;line-height:1.6;
}
.draggable-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.draggable-card.dragging{opacity:.4;cursor:grabbing}
.draggable-card.used{opacity:.35;background:var(--bg);cursor:not-allowed;pointer-events:none}
.drag-letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;min-width:28px;
  background:var(--primary);color:#fff;border-radius:50%;
  font-size:.75rem;font-weight:900;font-family:'Nunito',sans-serif;flex-shrink:0;
}
.drag-text{flex:1;color:var(--text)}
.drag-handle{color:var(--text-2);font-size:.9rem;flex-shrink:0}
.drop-zone{
  display:inline-flex;align-items:center;gap:8px;
  min-width:180px;min-height:38px;
  border:2px dashed var(--border);border-radius:var(--r-sm);
  padding:6px 12px;margin:0 4px;vertical-align:middle;
  transition:all .2s;background:#FAFBFF;cursor:default;position:relative;
}
.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.drop-zone.filled{border-style:solid;border-color:var(--success);background:var(--success-light);cursor:default}
.dz-placeholder{font-size:.82rem;color:var(--text-2);font-style:italic}
.dz-content{display:flex;align-items:center;gap:8px;flex:1}
.dz-letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;min-width:24px;
  background:var(--success);color:#fff;border-radius:50%;
  font-size:.7rem;font-weight:900;font-family:'Nunito',sans-serif;
}
.dz-text{font-size:.85rem;color:var(--text);line-height:1.4}
.dz-clear{
  background:var(--emphasis);color:#fff;border:none;border-radius:50%;
  width:20px;height:20px;cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .15s;
}
.dz-clear:hover{transform:scale(1.2)}

/* Section question (type 6) */
.section-question{padding:20px 26px;font-size:.95rem;line-height:2.3;background:var(--bg);border-bottom:2px solid var(--border)}
.sq-label{font-size:.72rem;font-weight:800;color:var(--primary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-family:'Nunito',sans-serif}

/* ===== QUIZ FOOTER ===== */
.quiz-footer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:2px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.ans-count{font-size:.88rem;color:var(--text-2)}
.ans-count b{color:var(--primary);font-family:'Nunito',sans-serif;font-weight:900}
.btn-submit{
  padding:13px 32px;background:var(--primary);color:#fff;border:none;
  border-radius:99px;font-size:.98rem;font-weight:900;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.btn-submit:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-submit.ready{background:var(--success);animation:pulse-green 2s ease infinite}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(107,203,119,.4)}50%{box-shadow:0 0 0 12px rgba(107,203,119,0)}}

/* ===== RESULTS VIEW ===== */
#view-results{background:var(--bg)}
.results-body{max-width:700px;margin:0 auto;padding:48px 24px 60px}
.score-hero{
  background:linear-gradient(135deg,var(--primary) 0%,#9C8CFF 100%);
  border-radius:var(--r);padding:44px;text-align:center;
  margin-bottom:24px;box-shadow:var(--shadow-lg);
  animation:fadeUp .5s ease both;
}
.score-label{font-size:.78rem;font-weight:800;letter-spacing:.14em;color:rgba(255,255,255,.65);text-transform:uppercase;margin-bottom:16px;font-family:'Nunito',sans-serif}
.score-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:5.5rem;color:var(--accent);line-height:1;margin-bottom:6px}
.score-of{font-size:1.1rem;color:rgba(255,255,255,.7);margin-bottom:24px}
.score-bar-wrap{background:rgba(255,255,255,.2);height:12px;border-radius:99px;overflow:hidden;max-width:280px;margin:0 auto 12px}
.score-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.score-pct{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:rgba(255,255,255,.8)}
.result-btn-row{display:flex;gap:12px;margin-bottom:20px}
.btn-outline{
  flex:1;padding:14px;background:var(--card);border:2px solid var(--border);
  color:var(--text);font-size:.95rem;font-weight:800;font-family:'Nunito',sans-serif;
  border-radius:var(--r-sm);cursor:pointer;transition:all .2s;
}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.review-toggle-btn{
  width:100%;padding:16px 22px;background:var(--card);border:2px solid var(--border);
  border-radius:var(--r-sm);font-size:.95rem;font-weight:800;font-family:'Nunito',sans-serif;
  color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  transition:all .2s;margin-bottom:14px;box-shadow:var(--shadow);
}
.review-toggle-btn:hover{border-color:var(--primary);box-shadow:var(--shadow-md)}
.review-items-wrap{display:none}
.review-items-wrap.open{display:flex;flex-direction:column;gap:10px}
.rev-item{
  background:var(--card);border-radius:var(--r-sm);padding:16px 20px;
  box-shadow:var(--shadow);border-left:5px solid var(--border);font-size:.9rem;
}
.rev-item.correct{border-color:var(--success)}
.rev-item.wrong{border-color:var(--emphasis)}
.rev-item.skipped{border-color:var(--accent)}
.rev-q{color:var(--text-2);font-size:.8rem;margin-bottom:5px}
.rev-user{margin-bottom:3px}
.rev-ans{font-weight:800}
.correct .rev-ans{color:var(--success)}
.wrong .rev-ans{color:var(--emphasis)}
.rev-hint{font-size:.82rem;color:var(--success)}

/* Responsive */
@media(max-width:600px){
  .topbar,.quiz-topbar,.quiz-footer{padding:12px 16px}

}

</head>

<!-- ===== SCRIPTS ===== -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ============================================================
// CONFIG
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwq-DlQxG7pQ-GwAowXBcWve5opsXJA_nJrsRZU-r0RtuPCw5Yhb01FJnfpYWIAewTiHA/exec';

// ============================================================
// State
// ============================================================
let userEmail   = '';
let currentTest = null;
let quizData    = null;
let answers     = {};
let historyData = [];  // user's exam history

// ============================================================
// API
// ============================================================
async function api(action, params = {}) {
  const url = new URL(SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v)));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function apiPost(action, params = {}) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, ...params }),
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============================================================
// Loading Overlay
// ============================================================
function showLoading(msg) {
  const ov = document.getElementById('loading-overlay');
  ov.querySelector('.ov-text').textContent = msg || '正在載入…';
  ov.classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

// ============================================================
// Google Sign-In
// ============================================================
function onGoogleSignIn(response) {
  const payload = parseJWT(response.credential);
  if (!payload?.email) { alert('登入失敗，請重試'); return; }
  userEmail = payload.email;
  showLoading('正在驗證身份，請稍候…');
  afterLogin();
}

function parseJWT(token) {
  try {
    const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  } catch { return null; }
}

async function afterLogin() {
  try {
    await api('registerUser', { email: userEmail });
    const data = await api('checkAccess', { email: userEmail });
    hideLoading();
    if (data.hasAccess) {
      showTests();
    } else {
      showView('activate');
      document.getElementById('act-email').textContent = userEmail;
    }
  } catch (e) {
    hideLoading();
    // 顯示錯誤在登入卡片上
    const errDiv = document.getElementById('login-err');
    if (errDiv) errDiv.textContent = '❌ 連線失敗：' + e.message + '，請重新整理頁面';
    console.error('afterLogin error:', e);
  }
}

function logout() {
  if (!confirm('確定登出？')) return;
  google.accounts.id.disableAutoSelect();
  userEmail = ''; answers = {}; quizData = null; currentTest = null; historyData = [];
  showView('login');
}

// ============================================================
// Views
// ============================================================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

// ============================================================
// Activate
// ============================================================
async function submitCode() {
  const code = document.getElementById('code-input').value.trim();
  const btn  = document.getElementById('code-btn');
  const msg  = document.getElementById('code-msg');
  if (!code) { msg.innerHTML = '<div class="msg-error">請輸入序號</div>'; return; }
  btn.disabled = true; btn.textContent = '驗證中…'; msg.innerHTML = '';
  try {
    const data = await api('activateCode', { email: userEmail, code });
    if (data.status === 'activated') {
      msg.innerHTML = '<div class="msg-success">✅ 序號兌換成功！正在進入…</div>';
      setTimeout(showTests, 1200);
    } else {
      msg.innerHTML = `<div class="msg-error">${data.error || '兌換失敗'}</div>`;
    }
  } catch { msg.innerHTML = '<div class="msg-error">連線失敗，請稍後再試</div>'; }
  btn.disabled = false; btn.textContent = '兌換序號';
}

// ============================================================
// Tests List
// ============================================================
async function showTests() {
  showView('tests');
  document.getElementById('tests-email').textContent = userEmail;

  const grid = document.getElementById('test-grid');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>載入中…</span></div>';

  try {
    const [tests, history] = await Promise.all([
      api('getTests'),
      api('getHistory', { email: userEmail }),
    ]);
    historyData = Array.isArray(history) ? history : [];

    // Build attempted map: test_id → { count, maxScore, total }
    const attempted = {};
    historyData.forEach(h => {
      const tid = norm(h.test_id);
      if (!attempted[tid]) attempted[tid] = { count: 0, maxScore: -1, total: Number(h.total) || 0 };
      attempted[tid].count++;
      const s = Number(h.score) || 0;
      if (s > attempted[tid].maxScore) attempted[tid].maxScore = s;
    });

    if (!tests?.length) { grid.innerHTML = '<p style="color:var(--text-2);padding:40px">目前尚無試卷</p>'; return; }

    grid.innerHTML = tests.map(t => {
      const tid  = norm(t.test_id);
      const type = String(t.test_type) === 'w' ? '筆試' : '聽力';
      const att  = attempted[tid];
      const attBadge = att
        ? `<div style="margin-top:10px"><span class="attempted-tag">✅ 已考過 ${att.count} 次｜最高 ${att.maxScore}/${att.total} 分</span></div>`
        : '';
      return `
      <div class="test-card" onclick="startTest('${tid}','${esc(t.test_name)}','${type}')">
        <div class="test-badge">${type}</div>
        <h3>${esc(t.test_name) || '試卷 ' + tid}</h3>
        <div class="test-id">${tid}</div>
        ${attBadge}
        <div class="test-arrow">→</div>
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--emphasis);padding:40px">載入失敗，請重新整理</p>';
  }
}

// ============================================================
// History Tab
// ============================================================
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!historyData.length) {
    el.innerHTML = '<p style="color:var(--text-2);padding:40px;text-align:center">尚無考試紀錄</p>';
    return;
  }
  el.innerHTML = historyData.map((h, idx) => {
    const score = Number(h.score) || 0;
    const total = Number(h.total) || 0;
    const pct   = total ? Math.round(score / total * 100) : 0;
    const ts    = String(h.timestamp || '').slice(0, 16);
    return `
    <div class="history-card">
      <div class="history-card-top" onclick="toggleHistoryReview(${idx})">
        <div>
          <div class="history-test-name">${esc(h.test_name)}</div>
          <div class="history-meta">${ts}　${pct}% 正確率</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="history-score-chip">
            <div class="history-score-num">${score}</div>
            <div class="history-score-total">/ ${total}</div>
          </div>
          <span style="color:var(--text-2)">▼</span>
        </div>
      </div>
      <div class="history-review" id="hr-${idx}">
        ${renderHistoryReview(h.review_json)}
      </div>
    </div>`;
  }).join('');
}

function toggleHistoryReview(idx) {
  const el = document.getElementById('hr-' + idx);
  el.classList.toggle('open');
}

function renderHistoryReview(reviewJson) {
  let items = [];
  try { items = JSON.parse(reviewJson || '[]'); } catch { return '<p style="color:var(--text-2)">無解析資料</p>'; }
  if (!items.length) return '<p style="color:var(--text-2)">無解析資料</p>';
  return '<div class="review-grid">' + items.map(r => {
    const cls = !r.u ? 'skipped' : r.ok ? 'correct' : 'wrong';
    const icon = !r.u ? '⏭' : r.ok ? '✅' : '❌';
    return `
    <div class="review-row ${cls}">
      <div class="rr-q">第 ${r.n} 題（${r.p} 分）</div>
      <div class="rr-ans ${r.ok ? 'rr-correct' : 'rr-wrong'}">你的答案：${r.u || '—'} ${icon}</div>
      ${!r.ok ? `<div class="rr-correct-hint">✔ 正確答案：${r.c}</div>` : ''}
    </div>`;
  }).join('') + '</div>';
}

// ============================================================
// Quiz
// ============================================================
async function startTest(testId, testName, typeLabel) {
  answers = {};
  currentTest = { test_id: testId, test_name: testName, type_label: typeLabel };
  showView('quiz');
  document.getElementById('quiz-title').textContent = testName || '試卷 ' + testId;
  document.getElementById('quiz-sub').textContent   = typeLabel;
  document.getElementById('quiz-body').innerHTML    =
    '<div class="loading-state"><div class="spinner"></div><span>載入題目中…</span></div>';
  try {
    quizData = await api('getTest', { testId });
    renderQuiz();
  } catch {
    document.getElementById('quiz-body').innerHTML = '<p style="color:var(--emphasis);padding:40px">題目載入失敗，請返回重試</p>';
  }
}

function retakeCurrentTest() {
  if (currentTest) startTest(currentTest.test_id, currentTest.test_name, currentTest.type_label);
}

function renderQuiz() {
  const { questions, sections } = quizData;
  const sectionMap = {};
  sections.forEach(s => { sectionMap[norm(s.section_id)] = s; });

  const processed = new Set();
  const blocks = [];
  let qNum = 1;

  questions.forEach(q => {
    const type  = String(q.type);
    const secId = norm(q.section_id);

    if (type === '1') {
      blocks.push(renderType1(q, qNum++));
    } else if (!processed.has(secId)) {
      processed.add(secId);
      const secQs = questions.filter(sq => norm(sq.section_id) === secId);
      const sec   = sectionMap[secId] || {};
      const start = qNum;
      switch (type) {
        case '2': blocks.push(renderCloze(sec, secQs, start)); break;
        case '3': blocks.push(renderWordFill(sec, secQs, start)); break;
        case '4': blocks.push(renderParaDrag(sec, secQs, start)); break;
        case '5': blocks.push(renderReading(sec, secQs, start)); break;
        case '6': blocks.push(renderMixed(sec, secQs, start)); break;
        default:  blocks.push(renderReading(sec, secQs, start));
      }
      qNum += secQs.length;
    }
  });

  document.getElementById('quiz-body').innerHTML = blocks.join('');
  document.getElementById('total-count').textContent = questions.length;
  updateProgress();
  initDragDrop();
}

/* Type 1 詞彙題 */
function renderType1(q, num) {
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">詞彙題</span>
      <span class="section-range">${num}</span>
    </div>
    <div class="questions-list">${renderMCQ(q, num)}</div>
  </div>`;
}

/* Type 2 綜合測驗 */
function renderCloze(sec, qs, startNum) {
  const passage = replaceBlanksNum(sec.section_content || '', startNum);
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">綜合測驗</span>
      <span class="section-label">選出最適合填入空格的答案</span>
      <span class="section-range">${startNum}–${startNum+qs.length-1}</span>
    </div>
    <div class="section-passage">${passage}</div>
    <div class="questions-list">${qs.map((q,i)=>renderMCQ(q,startNum+i)).join('')}</div>
  </div>`;
}

/* Type 3 文意選填 */
function renderWordFill(sec, qs, startNum) {
  const opts = getOpts(sec);
  const wbHTML = `<div class="wordbank"><div class="wb-title">Word Bank</div><div class="wb-items">${opts.map(o=>`<div class="wb-item"><b>${o.letter}</b>${o.text}</div>`).join('')}</div></div>`;
  const passage = replaceBlanksSelect(sec.section_content || '', qs, startNum, opts);
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">文意選填</span>
      <span class="section-label">從選項中選出最適合的字詞</span>
      <span class="section-range">${startNum}–${startNum+qs.length-1}</span>
    </div>
    ${wbHTML}
    <div class="section-passage">${passage}</div>
  </div>`;
}

/* Type 4 篇章結構 (DRAG & DROP) */
function renderParaDrag(sec, qs, startNum) {
  const opts = getOpts(sec);

  // Sentence bank
  const bankHTML = `
  <div class="sentence-bank">
    <div class="sb-title">✦ 請將句子拖曳至段落中的空格</div>
    <div class="sb-items">
      ${opts.map(o => `
      <div class="draggable-card" draggable="true" data-letter="${o.letter}" data-txt="${esc(o.text)}" id="dc_${o.letter}">
        <span class="drag-letter">${o.letter}</span>
        <span class="drag-text">${esc(o.text)}</span>
        <span class="drag-handle">⠿</span>
      </div>`).join('')}
    </div>
  </div>`;

  // Passage with drop zones
  let idx = 0;
  const passage = esc(sec.section_content || '').replace(/\n/g,'<br>').replace(/##/g, () => {
    if (idx >= qs.length) return '<span class="blank-num">?</span>';
    const q   = qs[idx];
    const qid = norm(q.question_id);
    const num = startNum + idx;
    idx++;
    return `<span class="blank-num">${num}</span><span class="drop-zone" data-qid="${qid}" data-num="${num}" id="dz_${qid}"><span class="dz-placeholder">拖曳至此</span></span>`;
  });

  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">篇章結構</span>
      <span class="section-label">將選項句子拖入正確位置</span>
      <span class="section-range">${startNum}–${startNum+qs.length-1}</span>
    </div>
    ${bankHTML}
    <div class="section-passage">${passage}</div>
  </div>`;
}

/* Type 5 閱讀測驗 */
function renderReading(sec, qs, startNum) {
  const imgHTML = sec.pic ? `<div class="section-image"><img src="${driveUrl(sec.pic)}" alt="題目圖片" onerror="this.parentElement.style.display='none'"></div>` : '';
  const passage = esc(sec.section_content || '').replace(/\n/g,'<br>');
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">閱讀測驗</span>
      <span class="section-label">閱讀文章後回答問題</span>
      <span class="section-range">${startNum}–${startNum+qs.length-1}</span>
    </div>
    ${imgHTML}
    <div class="section-passage">${passage}</div>
    <div class="questions-list">${qs.map((q,i)=>renderMCQ(q,startNum+i)).join('')}</div>
  </div>`;
}

/* Type 6 混合題 */
function renderMixed(sec, qs, startNum) {
  const imgHTML = sec.pic ? `<div class="section-image"><img src="${driveUrl(sec.pic)}" alt="題目圖片" onerror="this.parentElement.style.display='none'"></div>` : '';
  const passage = esc(sec.section_content || '').replace(/\n/g,'<br>');
  // Check if qs have MCQ options (type 1 or 5 style mixed in)
  let idx = 0;
  const sqContent = (sec.section_question || '').length > 0
    ? esc(sec.section_question).replace(/\n/g,'<br>').replace(/##/g, () => {
        if (idx >= qs.length) return '____';
        const q   = qs[idx]; const qid = norm(q.question_id); const num = startNum + idx; idx++;
        // If has options → MCQ dropdown, else text input
        const hasOpts = q.option1_A || q.option2_B;
        if (hasOpts) {
          const opts = ['A','B','C','D'].map((l,i) => {
            const k = ['option1_A','option2_B','option3_C','option4_D'][i];
            return q[k] ? `<option value="${l}">${l} — ${esc(String(q[k]))}</option>` : '';
          }).join('');
          return `<span class="blank-num">${num}</span><select class="blank-select" onchange="selectDrop('${qid}',this.value)"><option value="">—</option>${opts}</select>`;
        }
        return `<span class="blank-num">${num}</span><input class="blank-input" type="text" placeholder="填入答案" oninput="selectInput('${qid}',this.value)">`;
      })
    : qs.map((q, i) => renderMCQ(q, startNum + i)).join(''); // fallback: MCQ list

  const isSQ = (sec.section_question || '').length > 0;
  return `
  <div class="section-block">
    <div class="section-header">
      <span class="type-badge">混合題</span>
      <span class="section-label">閱讀文章後作答</span>
      <span class="section-range">${startNum}–${startNum+qs.length-1}</span>
    </div>
    ${imgHTML}
    <div class="section-passage">${passage}</div>
    ${isSQ
      ? `<div class="section-question"><div class="sq-label">作答區</div>${sqContent}</div>`
      : `<div class="questions-list">${sqContent}</div>`
    }
  </div>`;
}

// ============================================================
// Render Helpers
// ============================================================

function renderMCQ(q, num) {
  const qid  = norm(q.question_id);
  const keys = ['option1_A','option2_B','option3_C','option4_D'];
  const opts = ['A','B','C','D'].map((l,i) => {
    const t = q[keys[i]]; if (!t) return '';
    return `<label class="opt-label" onclick="selectMCQ('${qid}','${l}',this)">
      <input type="radio" name="q_${qid}" value="${l}">
      <span class="opt-key">${l}</span><span>${esc(String(t))}</span>
    </label>`;
  }).join('');
  return `
  <div class="question-item" id="qi_${qid}">
    <div class="q-header">
      <span class="q-num" id="qn_${qid}">${num}</span>
      <span class="q-text">${esc(q.question || '')}</span>
    </div>
    <div class="options-list">${opts}</div>
  </div>`;
}

function replaceBlanksNum(text, start) {
  let n = start;
  return esc(text).replace(/##/g, () => `<span class="blank-num">${n++}</span>`);
}

function replaceBlanksSelect(text, qs, start, opts) {
  let idx = 0;
  return esc(text).replace(/\n/g,'<br>').replace(/##/g, () => {
    if (idx >= qs.length) return '<span class="blank-num">?</span>';
    const q = qs[idx]; const qid = norm(q.question_id); const num = start + idx; idx++;
    const optHTML = opts.map(o => `<option value="${o.letter}">${o.letter} — ${o.text.slice(0,40)}</option>`).join('');
    return `<span class="blank-num">${num}</span><select class="blank-select" id="qs_${qid}" onchange="selectDrop('${qid}',this.value)"><option value="">—</option>${optHTML}</select>`;
  });
}

function getOpts(sec) {
  const letters = ['A','B','C','D','E','F','G','H','I','J'];
  const keys    = ['option1_A','option2_B','option3_C','option4_D','option5_E','option6_F','option7_G','option8_H','option9_I','option10_J'];
  return keys.map((k,i) => ({ letter: letters[i], text: String(sec[k] || '') })).filter(o => o.text);
}

function driveUrl(url) {
  if (!url) return '';
  const s = String(url).trim();
  // 已經是完整圖片網址就直接用
  if (s.startsWith('https://ivy89183312-rgb.github.io') || 
      s.match(/\.(jpg|jpeg|png|gif|webp)$/i)) return s;
  // 嘗試從 Google Drive URL 取出 ID
  const m = s.match(/\/d\/([a-zA-Z0-9_-]{10,})/) || s.match(/id=([a-zA-Z0-9_-]{10,})/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return s;
}

// ============================================================
// Drag & Drop (Type 4)
// ============================================================
let draggingLetter = null;
let draggingText   = null;

function initDragDrop() {
  // Desktop drag
  document.querySelectorAll('.draggable-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      if (card.classList.contains('used')) { e.preventDefault(); return; }
      draggingLetter = card.dataset.letter;
      draggingText   = card.dataset.txt;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });

  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (!draggingLetter) return;
      performDrop(zone, draggingLetter, draggingText);
    });
  });

  // Touch drag
  let touchCard = null, ghost = null;

  document.querySelectorAll('.draggable-card').forEach(card => {
    card.addEventListener('touchstart', e => {
      if (card.classList.contains('used')) return;
      touchCard = card;
      draggingLetter = card.dataset.letter;
      draggingText   = card.dataset.txt;
      // Create ghost
      ghost = card.cloneNode(true);
      ghost.id = 'drag-ghost';
      ghost.style.cssText = 'position:fixed;opacity:.75;pointer-events:none;z-index:9999;max-width:300px;transform:scale(1.05)';
      document.body.appendChild(ghost);
    }, { passive: true });
  });

  document.addEventListener('touchmove', e => {
    if (!touchCard) return;
    const t = e.touches[0];
    if (ghost) { ghost.style.left = (t.clientX - 40) + 'px'; ghost.style.top = (t.clientY - 20) + 'px'; }
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('.drop-zone');
    if (el) el.classList.add('drag-over');
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!touchCard) return;
    if (ghost) { ghost.remove(); ghost = null; }
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('.drop-zone');
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    if (el && draggingLetter) performDrop(el, draggingLetter, draggingText);
    touchCard = null; draggingLetter = null; draggingText = null;
  }, { passive: true });
}

function performDrop(zone, letter, text) {
  const qid = zone.dataset.qid;
  // If zone already filled → return old letter to bank
  const prevLetter = answers[qid];
  if (prevLetter) {
    const prevCard = document.getElementById('dc_' + prevLetter);
    if (prevCard) prevCard.classList.remove('used');
  }
  // If this letter was already placed elsewhere → clear that zone
  Object.entries(answers).forEach(([oid, l]) => {
    if (l === letter && oid !== qid) {
      const oldZone = document.getElementById('dz_' + oid);
      if (oldZone) fillDropZone(oldZone, null, null, oid);
      delete answers[oid];
    }
  });

  answers[qid] = letter;
  fillDropZone(zone, letter, text, qid);

  // Mark card as used
  const card = document.getElementById('dc_' + letter);
  if (card) card.classList.add('used');
  updateProgress();
}

function fillDropZone(zone, letter, text, qid) {
  if (!letter) {
    zone.className = 'drop-zone';
    zone.innerHTML = '<span class="dz-placeholder">拖曳至此</span>';
    return;
  }
  zone.className = 'drop-zone filled';
  zone.innerHTML = `
    <div class="dz-content">
      <span class="dz-letter">${letter}</span>
      <span class="dz-text">${text}</span>
    </div>
    <button class="dz-clear" onclick="clearDrop('${qid}','${letter}',this)" title="移除">×</button>`;
}

function clearDrop(qid, letter, btn) {
  delete answers[qid];
  const zone = document.getElementById('dz_' + qid);
  if (zone) fillDropZone(zone, null, null, qid);
  const card = document.getElementById('dc_' + letter);
  if (card) card.classList.remove('used');
  updateProgress();
}

// ============================================================
// Answer Recording
// ============================================================
function selectMCQ(qid, letter, labelEl) {
  answers[qid] = letter;
  labelEl.closest('.options-list').querySelectorAll('.opt-label').forEach(l => l.classList.remove('selected'));
  labelEl.classList.add('selected');
  document.getElementById('qi_' + qid)?.classList.add('answered');
  document.getElementById('qn_' + qid)?.classList.add('answered');
  updateProgress();
}

function selectDrop(qid, value) {
  if (value) answers[qid] = value; else delete answers[qid];
  updateProgress();
}

function selectInput(qid, value) {
  const v = value.trim();
  if (v) answers[qid] = v; else delete answers[qid];
  updateProgress();
}

function updateProgress() {
  if (!quizData) return;

  // 掃描所有 dropdown（type 3 文意選填）
  document.querySelectorAll('select.blank-select').forEach(sel => {
    const id = sel.id.replace(/^qs_/, '');
    if (sel.value) answers[id] = sel.value;
    else delete answers[id];
  });

  // 掃描所有文字輸入（type 6 混合題）
  document.querySelectorAll('input.blank-input').forEach(inp => {
    const m = (inp.getAttribute('oninput') || '').match(/selectInput\('([^']+)'/);
    if (m) {
      if (inp.value.trim()) answers[m[1]] = inp.value.trim();
      else delete answers[m[1]];
    }
  });

  const total    = quizData.questions.length;
  const answered = Object.keys(answers).length;
  const pct      = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('ans-count').textContent   = answered;
  document.getElementById('total-count').textContent  = total;
  document.getElementById('prog-bar').style.width     = pct + '%';
  document.getElementById('prog-txt').textContent     = `${answered}/${total}`;
  const btn = document.getElementById('submit-btn');
  if (answered === total) btn.classList.add('ready'); else btn.classList.remove('ready');
}

// ============================================================
// Submit
// ============================================================
function confirmSubmit() {
  const unanswered = quizData.questions.length - Object.keys(answers).length;
  if (unanswered > 0 && !confirm(`還有 ${unanswered} 題未作答，確定要交卷嗎？`)) return;
  calcAndShow();
}

async function calcAndShow() {
  const { questions } = quizData;
  let score = 0, total = 0;
  const review = [];
  let qNum = 1;

  questions.forEach(q => {
    const qid     = norm(q.question_id);
    const correct = String(q.answer || '').trim();
    const user    = String(answers[qid] || '').trim();
    const pts     = Number(q.score) || 0;
    total += pts;
    const ok = user.toLowerCase() === correct.toLowerCase();
    if (user && ok) score += pts;
    review.push({ n: qNum++, c: correct, u: user, p: pts, ok });
  });

  showView('results');

  // Animate score
  let disp = 0;
  const step = Math.max(1, Math.ceil(score / 40));
  const timer = setInterval(() => {
    disp = Math.min(disp + step, score);
    document.getElementById('res-score').textContent = disp;
    if (disp >= score) clearInterval(timer);
  }, 25);
  document.getElementById('res-of').textContent  = `/ ${total} 分`;
  const pct = total ? Math.round(score / total * 100) : 0;
  document.getElementById('res-pct').textContent = pct + '%';
  setTimeout(() => { document.getElementById('res-bar').style.width = pct + '%'; }, 100);

  // Review list
  document.getElementById('rev-list').innerHTML = review.map(r => {
    const cls  = !r.u ? 'skipped' : r.ok ? 'correct' : 'wrong';
    const icon = !r.u ? '⏭ 未作答' : r.ok ? '✅ 正確' : '❌ 錯誤';
    return `
    <div class="rev-item ${cls}">
      <div class="rev-q">第 ${r.n} 題（${r.p} 分）</div>
      <div class="rev-user">你的答案：<span class="rev-ans">${r.u || '—'}</span>　${icon}</div>
      ${!r.ok ? `<div class="rev-hint">✔ 正確答案：${r.c}</div>` : ''}
    </div>`;
  }).join('');

  // Save to history (silent fail)
  try {
    const reviewJson = JSON.stringify(review);
    await api('saveResult', {
      email: userEmail,
      testId: currentTest.test_id,
      testName: currentTest.test_name,
      score, total,
      reviewJson,
    });
    // Refresh historyData
    historyData = await api('getHistory', { email: userEmail });
    if (!Array.isArray(historyData)) historyData = [];
  } catch { /* silent */ }
}

function toggleReview(btn) {
  const list = document.getElementById('rev-list');
  list.classList.toggle('open');
  document.getElementById('rev-arrow').textContent = list.classList.contains('open') ? '▲' : '▼';
}

function backToTests() {
  if (!confirm('確定返回？目前作答進度不會儲存。')) return;
  answers = {}; quizData = null;
  showTests();
}

// ============================================================
// Utils
// ============================================================
function norm(val) { return String(val || '').trim().replace(/\.0+$/, ''); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
showView('login');
</script>
